<div class="{{spaceAbove}}"></div>
<div class="flex flex-row {{navMainTailwindArgs}}">
    <div class="grid grid-cols-{{navObjects.length}} w-full {{navGridTailwindArgs}}">
    @for (navObject of navObjects; track navObject) {
        <div class="{{navObject.tailwindArgs}}">
            @if(isBrand(navObject)) {
            <div class="gap-1">
                <div>
                    <img ngSrc="{{ brandImagePath }}" width="{{navObject.content.iconSize}}" height="{{navObject.content.iconSize}}"/>
                </div>
                <div class="font-brand">
                    {{ navObject.content.name }}
                </div>
            </div>
            }
            @else if(isList(navObject)) {
            <div class="">
                @for (item of navObject.content.items; track item) {
                @if(containsSubmenu(navObject.content, item)) {
                {{ item }}
                <span class="material-symbols-outlined text-primary-300">
                    arrow_drop_down
                </span>
                } @else {
                {{ item }}
                }
                }
            </div>
            }
        </div>
    }    
    </div>  
</div>
<div class="{{spaceBelow}}"></div>
